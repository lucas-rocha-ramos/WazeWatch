<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- Meta tags cruciais para Smartwatch e PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e1e1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <title>WatchNav PWA</title>

    <!-- Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS (Biblioteca de Mapas) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #1e1e1e; color: white; overflow: hidden; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        
        /* Esconder a atribuição do mapa para economizar espaço na tela do relógio */
        .leaflet-control-attribution { display: none !important; }
        .leaflet-control-zoom { display: none !important; }

        /* UI Sobreposta ao Mapa */
        .ui-layer { position: absolute; z-index: 1000; pointer-events: none; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .pointer-events-auto { pointer-events: auto; }

        /* Marcador do Usuário (Bolinha pulsante) */
        .user-marker {
            width: 20px; height: 20px;
            background-color: #3b82f6;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        /* Glassmorphism para os painéis */
        .glass-panel {
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div class="ui-layer p-2">
        <!-- Topo: Status e Velocidade -->
        <div class="flex justify-between items-start pointer-events-auto">
            <div class="glass-panel px-3 py-1 flex items-center gap-2">
                <span id="speedDisplay" class="text-xl font-bold text-blue-400">0</span>
                <span class="text-xs text-gray-300">km/h</span>
            </div>
            
            <div id="offlineIndicator" class="hidden glass-panel px-2 py-1 bg-red-900/80 text-white text-xs font-bold rounded-full flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"></path></svg>
                OFFLINE
            </div>
        </div>

        <!-- Botões Centrais -->
        <div class="flex justify-end pointer-events-auto">
            <button id="btnCenter" class="glass-panel p-3 rounded-full shadow-lg active:scale-95 transition-transform">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </button>
        </div>

        <!-- Rodapé: Info da Rota -->
        <div id="routeInfoPanel" class="hidden glass-panel p-3 w-full pointer-events-auto flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <div class="flex flex-col">
                    <span id="timeDisplay" class="text-lg font-bold text-green-400">-- min</span>
                    <span id="distanceDisplay" class="text-xs text-gray-300">-- km</span>
                </div>
                <button id="btnCancelRoute" class="bg-red-500 hover:bg-red-600 text-white p-2 rounded-full active:scale-95 transition-transform">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
        
        <!-- Mensagem Inicial -->
        <div id="startMessage" class="glass-panel p-2 w-full text-center text-xs text-gray-300 pointer-events-auto mb-2">
            Aguardando GPS... (Toque no mapa para navegar)
        </div>
    </div>

    <!-- Container do Mapa -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Registrar Service Worker para o PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado!', reg))
                    .catch(err => console.error('Erro no Service Worker', err));
            });
        }

        // Variáveis Globais
        let map;
        let userMarker;
        let destinationMarker;
        let routeLayer;
        let userPos = null;
        let isMapLockedToUser = true;

        // Elementos da UI
        const speedDisplay = document.getElementById('speedDisplay');
        const offlineIndicator = document.getElementById('offlineIndicator');
        const routeInfoPanel = document.getElementById('routeInfoPanel');
        const timeDisplay = document.getElementById('timeDisplay');
        const distanceDisplay = document.getElementById('distanceDisplay');
        const btnCenter = document.getElementById('btnCenter');
        const btnCancelRoute = document.getElementById('btnCancelRoute');
        const startMessage = document.getElementById('startMessage');

        // Inicializar Mapa
        function initMap() {
            // Inicia em uma visão global ou capital até pegar o GPS
            map = L.map('map', {
                zoomControl: false,
                tap: true
            }).setView([-15.7801, -47.9292], 4); 

            // Camada de Mapa Dark Mode (CartoDB Dark Matter)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);

            // Criar ícone do usuário
            const userIcon = L.divIcon({
                className: 'custom-div-icon',
                html: "<div class='user-marker'></div>",
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });

            userMarker = L.marker([-15.7801, -47.9292], { icon: userIcon }).addTo(map);

            // Evento de toque no mapa (Definir destino)
            map.on('click', function(e) {
                if (!userPos) {
                    alert("Aguarde o GPS te encontrar primeiro.");
                    return;
                }
                setDestinationAndRoute(e.latlng);
            });

            // Se o usuário arrastar o mapa, destrava a câmera
            map.on('dragstart', () => {
                isMapLockedToUser = false;
                btnCenter.classList.remove('hidden');
            });
        }

        // Rastrear GPS
        function startTracking() {
            if (!navigator.geolocation) {
                startMessage.innerText = "GPS não suportado neste dispositivo.";
                return;
            }

            navigator.geolocation.watchPosition(
                (position) => {
                    startMessage.classList.add('hidden'); // Esconder mensagem inicial
                    
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const speed = position.coords.speed; // Em metros/segundo
                    
                    userPos = L.latLng(lat, lng);
                    userMarker.setLatLng(userPos);

                    // Calcular e mostrar velocidade (m/s para km/h)
                    if (speed !== null && speed > 0) {
                        speedDisplay.innerText = Math.round(speed * 3.6);
                    } else {
                        speedDisplay.innerText = "0";
                    }

                    // Se a câmera estiver travada no usuário, segue ele
                    if (isMapLockedToUser) {
                        map.setView(userPos, 16);
                    }
                },
                (error) => {
                    console.error("Erro no GPS: ", error);
                    startMessage.innerText = "Erro ao buscar GPS. Verifique a permissão.";
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 10000,
                    timeout: 5000
                }
            );
        }

        // API de Rotas OSRM (Open Source Routing Machine)
        async function setDestinationAndRoute(destLatLng) {
            // Limpar rota anterior
            if (destinationMarker) map.removeLayer(destinationMarker);
            if (routeLayer) map.removeLayer(routeLayer);

            destinationMarker = L.marker(destLatLng).addTo(map);
            isMapLockedToUser = false; // Permite ver a rota inteira

            // Mostrar "Calculando..."
            routeInfoPanel.classList.remove('hidden');
            timeDisplay.innerText = "Calculando...";
            distanceDisplay.innerText = "";

            try {
                // A API OSRM usa a ordem (Longitude, Latitude)
                const start = `${userPos.lng},${userPos.lat}`;
                const end = `${destLatLng.lng},${destLatLng.lat}`;
                
                const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${start};${end}?overview=full&geometries=geojson`);
                const data = await response.json();

                if (data.routes && data.routes.length > 0) {
                    const route = data.routes[0];
                    
                    // Desenhar a linha no mapa
                    routeLayer = L.geoJSON(route.geometry, {
                        style: {
                            color: '#3b82f6', // Azul Waze
                            weight: 6,
                            opacity: 0.8
                        }
                    }).addTo(map);

                    // Ajustar mapa para caber a rota toda
                    map.fitBounds(routeLayer.getBounds(), { padding: [30, 30] });

                    // Atualizar UI com distância e tempo
                    const distanceKm = (route.distance / 1000).toFixed(1);
                    const durationMin = Math.round(route.duration / 60);

                    distanceDisplay.innerText = `${distanceKm} km`;
                    timeDisplay.innerText = durationMin > 60 
                        ? `${Math.floor(durationMin/60)}h ${durationMin%60}m` 
                        : `${durationMin} min`;
                } else {
                    timeDisplay.innerText = "Rota não encontrada";
                }

            } catch (error) {
                console.error("Erro ao buscar rota:", error);
                timeDisplay.innerText = "Erro ao calcular";
                if (!navigator.onLine) {
                    timeDisplay.innerText = "Sem internet para rotas";
                }
            }
        }

        // Eventos dos Botões
        btnCenter.addEventListener('click', () => {
            if (userPos) {
                map.setView(userPos, 16);
                isMapLockedToUser = true;
            }
        });

        btnCancelRoute.addEventListener('click', () => {
            if (destinationMarker) map.removeLayer(destinationMarker);
            if (routeLayer) map.removeLayer(routeLayer);
            routeInfoPanel.classList.add('hidden');
            if (userPos) {
                map.setView(userPos, 16);
                isMapLockedToUser = true;
            }
        });

        // Detectar modo Offline/Online
        window.addEventListener('offline', () => {
            offlineIndicator.classList.remove('hidden');
        });
        window.addEventListener('online', () => {
            offlineIndicator.classList.add('hidden');
        });

        // Se já abrir sem internet
        if (!navigator.onLine) {
            offlineIndicator.classList.remove('hidden');
        }

        // Inicializar
        initMap();
        startTracking();

    </script>
</body>
</html>
