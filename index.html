<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e1e1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <title>WatchNav PWA</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #1e1e1e; color: white; overflow: hidden; font-family: sans-serif; }
        
        #map-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; overflow: hidden; }
        #map { width: 150vw; height: 150vh; position: absolute; top: -25vh; left: -25vw; z-index: 1; transition: transform 0.5s ease-out; }
        
        .leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }

        .ui-layer { position: absolute; z-index: 1000; pointer-events: none; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; transition: opacity 0.3s; }
        .pointer-events-auto { pointer-events: auto; }

        .user-marker {
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 24px solid #3b82f6;
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.8));
            transform-origin: 50% 50%;
        }

        .glass-panel {
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Ocultar UI dinâmica durante a direção */
        .driving-mode .hide-on-drive { display: none !important; }
        .driving-mode #btnStartRoute { display: none !important; } /* Esconde o botão de iniciar depois que começou */
    </style>
</head>
<body class="">

    <div class="ui-layer p-2" id="uiLayer">
        
        <div id="turnByTurnPanel" class="hidden glass-panel p-3 w-full mb-2 pointer-events-auto flex items-center gap-3 bg-blue-900/90 border-blue-500">
            <svg id="turnIcon" class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            <div class="flex flex-col">
                <span id="turnDistance" class="text-xl font-bold text-white">-- m</span>
                <span id="turnInstruction" class="text-xs text-gray-200 truncate">Siga em frente</span>
            </div>
        </div>

        <div class="flex gap-2 w-full max-w-md mx-auto mb-2 pointer-events-auto relative hide-on-drive">
            <div class="relative w-full flex flex-col">
                <input type="text" id="searchInput" placeholder="Para onde?" autocomplete="off" class="glass-panel w-full px-3 py-2 text-sm text-white placeholder-gray-400 outline-none focus:ring-2 focus:ring-blue-500">
                <div id="suggestionsBox" class="hidden absolute top-[calc(100%+4px)] left-0 w-full glass-panel max-h-48 overflow-y-auto z-[2000] flex-col shadow-xl"></div>
            </div>
            <button id="btnSearch" class="glass-panel p-2 flex items-center justify-center text-white active:scale-95 transition-transform shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </button>
            <button id="btnVoice" class="glass-panel p-2 flex items-center justify-center text-white active:scale-95 transition-transform shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            </button>
        </div>

        <div class="flex justify-between items-start pointer-events-auto hide-on-drive mb-2">
            <button id="btnInstall" class="hidden glass-panel px-3 py-1 bg-green-600/80 text-white text-xs font-bold rounded-full flex items-center gap-1 active:scale-95">
                ↓ Instalar App
            </button>
            <button id="btnDownloadMap" class="glass-panel px-3 py-1 bg-purple-600/80 text-white text-xs font-bold rounded-full flex items-center gap-1 active:scale-95 ml-auto">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Baixar Mapa (Offline)
            </button>
        </div>

        <div class="flex justify-between items-start pointer-events-auto mt-auto mb-2">
            <div class="glass-panel px-3 py-1 flex items-center gap-2">
                <span id="speedDisplay" class="text-2xl font-bold text-blue-400">0</span>
                <span class="text-xs text-gray-300">km/h</span>
            </div>
            
            <div id="offlineIndicator" class="hidden glass-panel px-2 py-1 bg-red-900/80 text-white text-xs font-bold rounded-full flex items-center gap-1">
                OFFLINE
            </div>
        </div>

        <div class="flex justify-between pointer-events-auto mb-2">
            <button id="btnAlert" class="glass-panel p-3 rounded-full bg-orange-500/80 shadow-lg active:scale-95 transition-transform">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </button>

            <button id="btnCenter" class="glass-panel p-3 rounded-full shadow-lg active:scale-95 transition-transform hidden">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </button>
        </div>

        <div class="flex justify-center w-full pointer-events-auto mb-2">
            <button id="btnStartRoute" class="hidden bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-full shadow-lg active:scale-95 transition-transform w-3/4 text-center">
                INICIAR ROTA
            </button>
        </div>

        <div id="routeInfoPanel" class="hidden glass-panel p-3 w-full pointer-events-auto flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <div class="flex flex-col">
                    <span id="timeDisplay" class="text-lg font-bold text-green-400">-- min</span>
                    <span id="distanceDisplay" class="text-xs text-gray-300">-- km</span>
                </div>
                <button id="btnCancelRoute" class="bg-red-500 hover:bg-red-600 text-white p-2 rounded-full active:scale-95 transition-transform">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
        
        <button id="startMessage" class="glass-panel p-3 w-full text-center text-sm font-bold text-white bg-blue-600/80 pointer-events-auto active:scale-95 shadow-lg">
            INICIAR GPS (Toque Aqui)
        </button>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <script>
        // 1. INSTALAÇÃO PWA
        let deferredPrompt;
        const btnInstall = document.getElementById('btnInstall');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            btnInstall.classList.remove('hidden');
        });
        btnInstall.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') btnInstall.classList.add('hidden');
                deferredPrompt = null;
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
        }

        // Variáveis Globais
        let map, userMarker, destinationMarker, routeLayer;
        let userPos = null;
        let isMapLockedToUser = true;
        let routeSteps = [];
        let currentStepIndex = 0;
        let wakeLock = null;
        let lastSpokenInstruction = "";
        let isNavigating = false; 
        let bestVoice = null; 

        // UI Elements
        const speedDisplay = document.getElementById('speedDisplay');
        const offlineIndicator = document.getElementById('offlineIndicator');
        const routeInfoPanel = document.getElementById('routeInfoPanel');
        const timeDisplay = document.getElementById('timeDisplay');
        const distanceDisplay = document.getElementById('distanceDisplay');
        const btnCenter = document.getElementById('btnCenter');
        const btnCancelRoute = document.getElementById('btnCancelRoute');
        const startMessage = document.getElementById('startMessage');
        const searchInput = document.getElementById('searchInput');
        const btnSearch = document.getElementById('btnSearch');
        const btnVoice = document.getElementById('btnVoice');
        const suggestionsBox = document.getElementById('suggestionsBox');
        const turnByTurnPanel = document.getElementById('turnByTurnPanel');
        const turnDistance = document.getElementById('turnDistance');
        const turnInstruction = document.getElementById('turnInstruction');
        const btnAlert = document.getElementById('btnAlert');
        const btnDownloadMap = document.getElementById('btnDownloadMap');
        const btnStartRoute = document.getElementById('btnStartRoute');

        function initMap() {
            map = L.map('map', { zoomControl: false, tap: true }).setView([-15.7801, -47.9292], 4); 
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { subdomains: 'abcd', maxZoom: 19 }).addTo(map);

            const userIcon = L.divIcon({ className: 'custom-div-icon', html: "<div class='user-marker'></div>", iconSize: [24, 24], iconAnchor: [12, 12] });
            userMarker = L.marker([-15.7801, -47.9292], { icon: userIcon }).addTo(map);

            map.on('click', (e) => {
                if (!userPos) return alert("Aguarde o GPS te encontrar.");
                setDestinationAndRoute(e.latlng);
            });

            map.on('dragstart', () => {
                isMapLockedToUser = false;
                btnCenter.classList.remove('hidden');
            });
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        }
        function releaseWakeLock() {
            if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
        }

        // --- SISTEMA DE VOZ REALISTA ---
        function loadVoices() {
            if ('speechSynthesis' in window) {
                const voices = window.speechSynthesis.getVoices();
                bestVoice = voices.find(v => v.lang.includes('pt-BR') && (v.name.includes('Google') || v.name.includes('Premium') || v.name.includes('Enhanced'))) 
                            || voices.find(v => v.lang.includes('pt-BR')); 
            }
        }
        
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
            loadVoices();
        }

        function speakInstruction(text) {
            if (text === lastSpokenInstruction || !isNavigating) return; 
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'pt-BR';
                
                if (bestVoice) {
                    utterance.voice = bestVoice;
                }
                
                utterance.rate = 1.0; 
                utterance.pitch = 1.0; 

                window.speechSynthesis.speak(utterance);
                lastSpokenInstruction = text;
            }
        }

        function formatInstructionToSpeak(step, distanceMeters) {
            const modifierMap = {
                'uturn': 'Faça um retorno',
                'sharp right': 'Vire fechado à direita',
                'right': 'Vire à direita',
                'slight right': 'Mantenha-se à direita',
                'straight': 'Siga em frente',
                'slight left': 'Mantenha-se à esquerda',
                'left': 'Vire à esquerda',
                'sharp left': 'Vire fechado à esquerda'
            };

            const typeMap = {
                'turn': modifierMap[step.maneuver.modifier] || 'Vire',
                'new name': 'Continue em',
                'depart': 'Siga em direção a',
                'arrive': 'Você chegará ao seu destino',
                'merge': 'Incorpore-se a',
                'on ramp': 'Pegue a alça de acesso para',
                'off ramp': 'Pegue a saída para',
                'fork': modifierMap[step.maneuver.modifier] || 'Mantenha-se',
                'end of road': 'No fim da rua, ' + (modifierMap[step.maneuver.modifier] || 'vire'),
                'roundabout': 'Na rotatória, pegue a saída para'
            };

            let action = typeMap[step.maneuver.type] || 'Siga';
            let streetName = step.name ? step.name : '';
            
            let spokenText = "";
            if (distanceMeters > 0) {
                 spokenText += `Em ${Math.round(distanceMeters)} metros, `;
            }
            spokenText += action;
            if (streetName !== '') {
                spokenText += ` em ${streetName}`;
            }

            return spokenText;
        }

        function startTracking() {
            if (!navigator.geolocation) {
                startMessage.innerText = "GPS não suportado.";
                startMessage.classList.remove('hidden');
                return;
            }

            navigator.geolocation.watchPosition(
                (position) => {
                    startMessage.classList.add('hidden');
                    
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const speed = position.coords.speed || 0; 
                    const heading = position.coords.heading;
                    
                    userPos = L.latLng(lat, lng);
                    userMarker.setLatLng(userPos);

                    const speedKmh = Math.round(speed * 3.6);
                    speedDisplay.innerText = speedKmh;

                    if (isMapLockedToUser) {
                        map.setView(userPos, 18); 
                        if (heading !== null && heading !== NaN && isNavigating) {
                            document.getElementById('map').style.transform = `rotate(${-heading}deg)`;
                            const markerEl = document.querySelector('.user-marker');
                            if(markerEl) markerEl.style.transform = `rotate(${heading}deg)`;
                        }
                    }

                    if (isNavigating && routeSteps.length > 0 && currentStepIndex < routeSteps.length) {
                        const nextStep = routeSteps[currentStepIndex];
                        const stepLatLng = L.latLng(nextStep.maneuver.location[1], nextStep.maneuver.location[0]);
                        const distanceToNext = userPos.distanceTo(stepLatLng);

                        turnDistance.innerText = `${Math.round(distanceToNext)}m`;
                        turnInstruction.innerText = nextStep.name ? `Vire na ${nextStep.name}` : nextStep.maneuver.type;

                        if (distanceToNext < 50) {
                            speakInstruction(formatInstructionToSpeak(nextStep, 0));
                            currentStepIndex++; 
                        } else if (distanceToNext < 200 && distanceToNext > 180) {
                            speakInstruction(formatInstructionToSpeak(nextStep, 200));
                        } else if (distanceToNext < 500 && distanceToNext > 480) {
                            speakInstruction(formatInstructionToSpeak(nextStep, 500));
                        }
                    }
                },
                (error) => { startMessage.innerText = "Erro. Dê permissão de GPS."; startMessage.classList.remove('hidden'); },
                { enableHighAccuracy: true, maximumAge: 5000, timeout: 5000 }
            );
        }

        // --- SISTEMA DE ROTAS CORRIGIDO PARA NÃO TRAVAR ---
        async function setDestinationAndRoute(destLatLng) {
            if (destinationMarker) map.removeLayer(destinationMarker);
            if (routeLayer) map.removeLayer(routeLayer);
            routeSteps = [];
            currentStepIndex = 0;
            lastSpokenInstruction = "";
            isNavigating = false; 
            document.body.classList.remove('driving-mode'); 

            destinationMarker = L.marker(destLatLng).addTo(map);
            isMapLockedToUser = false;
            document.getElementById('map').style.transform = `rotate(0deg)`;

            routeInfoPanel.classList.remove('hidden');
            btnStartRoute.classList.remove('hidden'); 
            turnByTurnPanel.classList.add('hidden'); 

            // Garante que a cor fique verde durante o carregamento
            timeDisplay.classList.remove('text-red-400');
            timeDisplay.classList.add('text-green-400');
            timeDisplay.innerText = "Calculando...";
            distanceDisplay.innerText = "";

            // Cria um cronômetro de 10 segundos para forçar o cancelamento se travar
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);

            try {
                // Formata precisamente as coordenadas para não gerar erro no servidor
                const startLng = userPos.lng.toFixed(6);
                const startLat = userPos.lat.toFixed(6);
                const endLng = destLatLng.lng.toFixed(6);
                const endLat = destLatLng.lat.toFixed(6);
                
                const start = `${startLng},${startLat}`;
                const end = `${endLng},${endLat}`;
                
                // Adicionado cache: no-store e um timestamp dinâmico (t=...) para que o navegador não entregue um cache falso
                const url = `https://router.project-osrm.org/route/v1/driving/${start};${end}?overview=full&geometries=geojson&steps=true&t=${Date.now()}`;
                
                const response = await fetch(url, { 
                    cache: 'no-store',
                    signal: controller.signal
                });

                clearTimeout(timeoutId); // Limpa o cronômetro se deu certo

                if (!response.ok) throw new Error("Servidor recusou a rota");

                const data = await response.json();

                if (data.routes && data.routes.length > 0) {
                    const route = data.routes[0];
                    routeLayer = L.geoJSON(route.geometry, { style: { color: '#3b82f6', weight: 8, opacity: 0.9 } }).addTo(map);
                    
                    map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });

                    routeSteps = route.legs[0].steps || [];

                    const distanceKm = (route.distance / 1000).toFixed(1);
                    const durationMin = Math.round(route.duration / 60);
                    distanceDisplay.innerText = `${distanceKm} km`;
                    timeDisplay.innerText = durationMin > 60 ? `${Math.floor(durationMin/60)}h ${durationMin%60}m` : `${durationMin} min`;
                } else {
                    // Exibe mensagem de erro na própria UI
                    timeDisplay.classList.remove('text-green-400');
                    timeDisplay.classList.add('text-red-400');
                    timeDisplay.innerText = "Sem rota";
                    distanceDisplay.innerText = "Local inacessível";
                }
            } catch (error) { 
                clearTimeout(timeoutId);
                timeDisplay.classList.remove('text-green-400');
                timeDisplay.classList.add('text-red-400'); // Fica vermelho para indicar falha
                
                if (error.name === 'AbortError') {
                    timeDisplay.innerText = "Tempo esgotado";
                    distanceDisplay.innerText = "Falha de rede";
                } else {
                    timeDisplay.innerText = "Erro ao calcular";
                    distanceDisplay.innerText = "Tente novamente";
                }
            }
        }

        btnStartRoute.addEventListener('click', () => {
            if (!userPos || routeSteps.length === 0) return;
            
            isNavigating = true; 
            document.body.classList.add('driving-mode'); 
            btnStartRoute.classList.add('hidden'); 
            turnByTurnPanel.classList.remove('hidden'); 

            map.setView(userPos, 18);
            isMapLockedToUser = true;
            
            requestWakeLock(); 
            
            if (routeSteps.length > 0) {
                 speakInstruction("Iniciando rota. " + formatInstructionToSpeak(routeSteps[0], 0));
            }
        });

        btnCenter.addEventListener('click', () => {
            if (userPos) {
                map.setView(userPos, 18); 
                isMapLockedToUser = true;
                btnCenter.classList.add('hidden');
            }
        });

        btnCancelRoute.addEventListener('click', () => {
            if (destinationMarker) map.removeLayer(destinationMarker);
            if (routeLayer) map.removeLayer(routeLayer);
            
            routeInfoPanel.classList.add('hidden');
            turnByTurnPanel.classList.add('hidden');
            btnStartRoute.classList.add('hidden'); 
            document.body.classList.remove('driving-mode'); 
            
            routeSteps = [];
            isNavigating = false;
            document.getElementById('map').style.transform = `rotate(0deg)`;
            releaseWakeLock();
            
            if (userPos) { map.setView(userPos, 16); isMapLockedToUser = true; }
        });

        btnAlert.addEventListener('click', () => {
            if(!userPos) return;
            const alertIcon = L.divIcon({ className: 'custom-alert', html: '⚠️', iconSize: [24, 24], iconAnchor: [12, 12] });
            L.marker([userPos.lat, userPos.lng], {icon: alertIcon}).addTo(map).bindPopup("Alerta reportado!").openPopup();
        });

        btnDownloadMap.addEventListener('click', async () => {
            if (!userPos) return alert("Aguarde o GPS.");
            const btn = btnDownloadMap;
            const originalText = btn.innerHTML;
            btn.innerHTML = "Baixando 5km...";
            
            const bounds = userPos.toBounds(5000);
            const originalZoom = map.getZoom();
            isMapLockedToUser = false;

            map.fitBounds(bounds);
            
            setTimeout(() => {
                btn.innerHTML = "Mapa Salvo!";
                map.setView(userPos, originalZoom);
                isMapLockedToUser = true;
                setTimeout(() => btn.innerHTML = originalText, 3000);
            }, 2000);
        });

        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value;
            clearTimeout(searchTimeout);
            if (!query.trim()) { suggestionsBox.classList.add('hidden'); return; }
            searchTimeout = setTimeout(() => fetchSuggestions(query), 500);
        });

        async function fetchSuggestions(query) {
            if (!userPos) return;
            try {
                const bounds = map.getBounds();
                const viewbox = `${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()},${bounds.getSouth()}`;
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&viewbox=${viewbox}&bounded=0&limit=5`);
                const data = await response.json();
                suggestionsBox.innerHTML = '';
                if (data && data.length > 0) {
                    suggestionsBox.classList.remove('hidden');
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'p-3 border-b border-gray-600/50 text-xs text-gray-200 hover:bg-gray-700/80 cursor-pointer last:border-0 truncate';
                        div.innerText = item.display_name;
                        div.addEventListener('click', () => {
                            searchInput.value = item.display_name;
                            suggestionsBox.classList.add('hidden');
                            const destLatLng = L.latLng(parseFloat(item.lat), parseFloat(item.lon));
                            setDestinationAndRoute(destLatLng);
                        });
                        suggestionsBox.appendChild(div);
                    });
                } else { suggestionsBox.classList.add('hidden'); }
            } catch (error) {}
        }

        async function geocodeAndRoute(query) {
            if (!userPos || !query.trim()) return;
            suggestionsBox.classList.add('hidden');
            startMessage.innerText = "Buscando..."; startMessage.classList.remove('hidden');
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await response.json();
                if (data && data.length > 0) {
                    const destLatLng = L.latLng(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    setDestinationAndRoute(destLatLng);
                    startMessage.classList.add('hidden');
                } else { startMessage.innerText = "Não encontrado."; setTimeout(() => startMessage.classList.add('hidden'), 3000); }
            } catch (error) { startMessage.innerText = "Erro."; setTimeout(() => startMessage.classList.add('hidden'), 3000); }
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            btnVoice.addEventListener('click', () => { recognition.start(); searchInput.placeholder = "Ouvindo..."; btnVoice.classList.add('text-red-400'); });
            recognition.addEventListener('result', (e) => { const transcript = e.results[0][0].transcript; searchInput.value = transcript; geocodeAndRoute(transcript); });
            recognition.addEventListener('end', () => { searchInput.placeholder = "Para onde?"; btnVoice.classList.remove('text-red-400'); });
        } else { btnVoice.style.display = 'none'; }

        btnSearch.addEventListener('click', () => geocodeAndRoute(searchInput.value));
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') geocodeAndRoute(searchInput.value); });

        window.addEventListener('offline', () => offlineIndicator.classList.remove('hidden'));
        window.addEventListener('online', () => offlineIndicator.classList.add('hidden'));
        if (!navigator.onLine) offlineIndicator.classList.remove('hidden');

        startMessage.addEventListener('click', () => {
            startMessage.innerText = "Buscando satélites...";
            startMessage.classList.remove('bg-blue-600/80', 'font-bold', 'text-sm', 'text-white', 'shadow-lg');
            startMessage.classList.add('text-gray-300', 'text-xs', 'bg-transparent');
            startTracking();
        });

        initMap();
        
    </script>
</body>
</html>
